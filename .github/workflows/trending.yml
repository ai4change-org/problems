name: Trending Issues

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - name: Identify and label trending issues
        uses: actions/github-script@v7
        with:
          script: |
            const TRENDING_LABEL = '🔥 trending';
            const REACTION_THRESHOLD = 5;
            const LOOKBACK_DAYS = 30;

            const since = new Date();
            since.setDate(since.getDate() - LOOKBACK_DAYS);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              since: since.toISOString(),
              per_page: 100
            });

            const problemIssues = issues.filter(i =>
              !i.pull_request &&
              i.labels.some(l => l.name === '🌱 submitted')
            );

            for (const issue of problemIssues) {
              const reactions = await github.rest.reactions.listForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              const thumbsUp = reactions.data.filter(r => r.content === '+1').length;
              const hasTrending = issue.labels.some(l => l.name === TRENDING_LABEL);

              if (thumbsUp >= REACTION_THRESHOLD && !hasTrending) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [TRENDING_LABEL]
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## 🔥 This problem is trending!\n\nThis issue has received significant community support (${thumbsUp} votes). The AI4Change community is paying attention.\n\n**What happens next:**\n- This problem will be highlighted in our weekly digest\n- Solution proposals are especially welcome — [propose one here](../../issues/new?template=solution-proposal.yml)\n- If you have relevant expertise, consider [volunteering](../../issues/new?template=volunteer.yml)\n\nThank you to everyone who voted and contributed to the discussion! 🌍`
                });

                console.log(`Marked issue #${issue.number} as trending (${thumbsUp} votes)`);
              } else if (thumbsUp < REACTION_THRESHOLD && hasTrending) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: TRENDING_LABEL
                }).catch(() => {});
              }
            }

            console.log(`Processed ${problemIssues.length} issues for trending status`);
