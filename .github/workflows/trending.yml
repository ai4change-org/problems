name: Label Trending Issues

on:
  schedule:
    - cron: '0 8 * * 0'  # Every Sunday at 8am UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - name: Find and label trending issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
              sort: 'created',
              direction: 'desc'
            });

            for (const issue of issues) {
              // Get reactions for this issue
              const { data: reactions } = await github.rest.reactions.listForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              // Count positive reactions (👍, ❤️, 🚀, 🎉)
              const positiveReactions = reactions.filter(r =>
                ['+1', 'heart', 'rocket', 'hooray'].includes(r.content)
              ).length;

              const labels = issue.labels.map(l => l.name);
              const hasTrending = labels.includes('🔥 trending');

              if (positiveReactions >= 10 && !hasTrending) {
                // Add trending label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['🔥 trending']
                });

                // Add a comment celebrating the milestone
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## 🔥 This problem is trending!\n\nThis issue has reached **${positiveReactions} positive reactions** from the community. That means people care about this problem and want to see it solved.\n\n**What happens next:**\n- This problem is now prioritized for solution design\n- If you have ideas, [propose a solution](https://github.com/ai4change-org/problems/issues/new?template=solution-proposal.yml)\n- If you want to help build it, comment below with your skills\n\nThe community has spoken. Let's make this happen! 🌍`
                });

                console.log(`Labeled issue #${issue.number} as trending (${positiveReactions} reactions)`);
              }
            }
