name: Auto-Label Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label based on content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title} ${issue.body}`.toLowerCase();
            const labels = [];

            const categories = {
              '🌾 agriculture': [
                'agriculture', 'farming', 'crop', 'livestock', 'irrigation',
                'harvest', 'soil', 'fertilizer', 'pest', 'food security',
                'smallholder', 'agronomist', 'seed', 'drought'
              ],
              '🎓 education': [
                'education', 'school', 'student', 'teacher', 'literacy',
                'learning', 'curriculum', 'classroom', 'university', 'training',
                'textbook', 'tutor', 'mentor'
              ],
              '🏥 health': [
                'health', 'medical', 'hospital', 'clinic', 'disease',
                'diagnosis', 'patient', 'medicine', 'vaccine', 'maternal',
                'malaria', 'hiv', 'tuberculosis', 'mental health', 'pharmacy',
                'supply chain'
              ],
              '🏗️ infrastructure': [
                'infrastructure', 'road', 'bridge', 'housing', 'transport',
                'building', 'construction', 'urban', 'rural development',
                'connectivity', 'internet access'
              ],
              '🌍 environment': [
                'environment', 'climate', 'pollution', 'deforestation',
                'biodiversity', 'conservation', 'carbon', 'emissions',
                'renewable', 'waste', 'recycling', 'ecosystem'
              ],
              '💧 water': [
                'water', 'sanitation', 'clean water', 'well', 'groundwater',
                'waterborne', 'drinking water', 'water quality', 'purification',
                'water access', 'hygiene'
              ],
              '⚡ energy': [
                'energy', 'electricity', 'solar', 'power grid', 'microgrid',
                'off-grid', 'battery', 'electrification', 'blackout',
                'energy access'
              ],
              '🚨 disaster-response': [
                'disaster', 'earthquake', 'flood', 'hurricane', 'tsunami',
                'emergency', 'relief', 'evacuation', 'rescue', 'humanitarian',
                'crisis', 'conflict', 'refugee'
              ]
            };

            for (const [label, keywords] of Object.entries(categories)) {
              if (keywords.some(kw => text.includes(kw))) {
                labels.push(label);
              }
            }

            const regions = {
              '🌍 africa': ['africa', 'kenya', 'nigeria', 'ethiopia', 'tanzania', 'uganda', 'ghana', 'south africa', 'mozambique', 'senegal', 'mali', 'niger', 'congo', 'rwanda', 'malawi'],
              '🌏 asia': ['asia', 'india', 'bangladesh', 'nepal', 'indonesia', 'philippines', 'vietnam', 'cambodia', 'myanmar', 'pakistan', 'sri lanka', 'thailand'],
              '🌎 americas': ['brazil', 'mexico', 'colombia', 'peru', 'haiti', 'guatemala', 'honduras', 'bolivia', 'caribbean'],
              '🌍 europe': ['europe', 'ukraine', 'romania', 'turkey'],
              '🌏 oceania': ['oceania', 'pacific islands', 'fiji', 'papua new guinea', 'tonga', 'samoa']
            };

            for (const [label, keywords] of Object.entries(regions)) {
              if (keywords.some(kw => text.includes(kw))) {
                labels.push(label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }
