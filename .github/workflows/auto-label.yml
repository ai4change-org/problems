name: Auto-Label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add 'submitted' label to new problem issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title || '';

            // Only label issues that use the problem template
            if (title.startsWith('[Problem]:')) {
              // Add the submitted label (should already be set by template, but ensure it)
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['🌱 submitted']
              });

              // Try to detect category from issue body and add appropriate labels
              const body = issue.body || '';

              // Region detection
              const regions = {
                'Africa': '🌍 Africa',
                'Asia': '🌏 Asia',
                'Europe': '🌍 Europe',
                'North America': '🌎 North America',
                'Central America': '🌎 Central America & Caribbean',
                'South America': '🌎 South America',
                'Oceania': '🌏 Oceania',
                'Middle East': '🌍 Middle East',
                'Global': '🌐 Global'
              };

              const labelsToAdd = [];

              for (const [key, label] of Object.entries(regions)) {
                if (body.includes(key)) {
                  labelsToAdd.push(label);
                  break;
                }
              }

              // Category detection
              const categories = {
                'Agriculture': '🌾 agriculture',
                'Education': '🎓 education',
                'Health': '🏥 health',
                'Environment': '🌍 environment',
                'Infrastructure': '🏗️ infrastructure',
                'Economic': '💰 economic-development',
                'Governance': '🏛️ governance',
                'Disaster': '🚨 disaster-response',
                'Water': '💧 water-sanitation',
                'Energy': '⚡ energy',
                'Digital': '📱 digital-inclusion'
              };

              for (const [key, label] of Object.entries(categories)) {
                if (body.includes(key)) {
                  labelsToAdd.push(label);
                  break;
                }
              }

              // Urgency detection
              if (body.includes('Critical')) {
                labelsToAdd.push('🔴 critical');
              }

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: labelsToAdd
                });
              }
            }
