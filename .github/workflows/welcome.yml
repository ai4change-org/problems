name: Welcome New Contributors

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time issue creators
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const issueNumber = context.payload.issue.number;

            // Check if this is their first issue in this repo
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all',
              per_page: 2
            });

            if (issues.data.length <= 1) {
              const labels = context.payload.issue.labels.map(l => l.name);
              const isVolunteer = labels.includes('🙋 volunteer');
              const isSolution = labels.includes('💡 solution-proposal');

              let message;

              if (isVolunteer) {
                message = `## 🎉 Welcome to AI4Change, @${creator}!\n\nThank you for volunteering your skills! You're joining a global community of people who believe technology should serve everyone.\n\n**Here's how to get started:**\n1. 📋 Browse [open problems](../../issues?q=is%3Aissue+is%3Aopen+label%3A%22🌱+submitted%22) and find ones that match your skills\n2. 💬 Join the [discussion forums](../../discussions) to meet other contributors\n3. 🔥 Check out [trending problems](../../issues?q=is%3Aissue+is%3Aopen+label%3A%22🔥+trending%22) where help is needed most\n4. 📖 Read our [Contributing Guide](../../blob/main/CONTRIBUTING.md)\n\nWe're glad you're here! 🌍`;
              } else if (isSolution) {
                message = `## 🎉 Welcome to AI4Change, @${creator}!\n\nThank you for proposing a solution! This is how real change happens — someone sees a problem and imagines what's possible.\n\n**What happens next:**\n- The community will discuss your proposal\n- Others may build on your idea or offer to help\n- If there's enough support, we'll move it to active development\n\nIn the meantime, check out our [Contributing Guide](../../blob/main/CONTRIBUTING.md) and join the [discussions](../../discussions)!\n\nWelcome aboard! 🌍`;
              } else {
                message = `## 🎉 Welcome to AI4Change, @${creator}!\n\nThank you for submitting your first problem. **Every solution starts with someone brave enough to name the problem.** You've just taken that step.\n\n**What happens next:**\n1. 👀 The community will review and discuss your problem\n2. 👍 Others will vote if they've seen this problem too\n3. 💡 Solution proposals may emerge from the community\n4. 🔥 If it gains traction, it'll be marked as trending\n\n**How you can help right now:**\n- Share this issue with people who face this problem — their context is valuable\n- Respond to questions from the community\n- 👍 Vote on [other problems](../../issues?q=is%3Aissue+is%3Aopen+label%3A%22🌱+submitted%22) you care about\n\nWelcome to the community! Together, we build solutions. 🌍`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: message
              });

              console.log(`Welcomed first-time contributor: ${creator}`);
            }
