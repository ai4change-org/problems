name: Welcome New Contributors

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Check if first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all'
            });

            // First issue if this is the only one
            const isFirstIssue = issues.length <= 1;
            core.setOutput('is_first', isFirstIssue.toString());
            return isFirstIssue;

      - name: Welcome first-time contributor
        if: steps.check.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            const title = issue.title || '';

            let message = '';

            if (title.startsWith('[Problem]:')) {
              message = `## Welcome to AI4Change, @${creator}! 🌍

Thank you for submitting your first problem! Every solution starts with someone brave enough to name the challenge.

**Here's what happens next:**
- The community will read, discuss, and vote on your problem
- Add a 👍 reaction to problems you care about — it helps us prioritize
- Feel free to add more context in the comments as you think of it

**Useful links:**
- 📖 [Contributing Guide](https://github.com/ai4change-org/problems/blob/main/CONTRIBUTING.md) — How to get involved
- 💬 [Discussions](https://github.com/ai4change-org/problems/discussions) — Connect with the community
- 💡 [Propose a Solution](https://github.com/ai4change-org/problems/issues/new?template=solution-proposal.yml) — Have an idea? Share it!

**Your voice matters.** The person closest to the problem often has the best insight into the solution. Thank you for being part of this. 💛`;

            } else if (title.startsWith('[Solution]:')) {
              message = `## Welcome to AI4Change, @${creator}! 💡

Thank you for proposing your first solution! Great ideas come from everywhere.

**Useful links:**
- 📖 [Contributing Guide](https://github.com/ai4change-org/problems/blob/main/CONTRIBUTING.md)
- 💬 [Discussions](https://github.com/ai4change-org/problems/discussions)

We're excited to have you here! 💛`;

            } else if (title.startsWith('[Volunteer]:')) {
              message = `## Welcome to AI4Change, @${creator}! 🙋

Thank you for volunteering your skills! We'll connect you with problems that match your expertise.

**While you wait:**
- Browse [open problems](https://github.com/ai4change-org/problems/issues?q=is%3Aissue+is%3Aopen+label%3A%22🌱+submitted%22) and add your perspective
- Check out [trending problems](https://github.com/ai4change-org/problems/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc) the community is excited about
- Join the [Discussions](https://github.com/ai4change-org/problems/discussions)

Every skill matters — whether you code, translate, test, teach, or organize. 💛`;

            } else {
              message = `## Welcome to AI4Change, @${creator}! 🌍

Thanks for your first contribution! Check out our [Contributing Guide](https://github.com/ai4change-org/problems/blob/main/CONTRIBUTING.md) to learn more about how to get involved.

We're glad you're here! 💛`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            });
