name: Stale Issue Management

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            👋 This problem hasn't seen activity in 90 days.

            **This doesn't mean it's not important!** Sometimes great problems just need the right person to see them.

            **To keep this issue active**, you can:
            - 💬 Add new context or updates
            - 👍 React to show continued interest
            - 💡 [Propose a solution](../../issues/new?template=solution-proposal.yml)

            If no activity occurs in the next 30 days, this issue will be closed. It can always be reopened — no problem is forgotten.
          close-issue-message: |
            This issue has been closed due to inactivity. **The problem hasn't gone away** — we just want to keep the board focused on issues the community is actively engaged with.

            **Want to revive this?** Simply reopen the issue and add a comment with any updates. Problems worth solving don't expire. 🌍
          stale-issue-label: '😴 stale'
          days-before-stale: 90
          days-before-close: 30
          exempt-issue-labels: '🔥 trending,✅ committed,🔨 building,📦 shipped'
          days-before-pr-stale: -1
          days-before-pr-close: -1
          operations-per-run: 30
